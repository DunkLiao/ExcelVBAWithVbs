<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel VBA 模組庫</title>
  <link rel="stylesheet" href="style.css" />
  <!-- app-data.js 由 build.py 產生，供 file:// 本地開啟使用 -->
  <script src="app-data.js"></script>
  <!-- JSZip：全部下載打包用 -->
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-left">
      <button id="sidebar-toggle" class="btn-sidebar-toggle" title="開關目錄">☰</button>
      <span class="logo">❤️ Excel VBA 模組庫</span>
      <span id="stats" class="stats"></span>
    </div>
    <div class="search-wrap">
      <input
        type="search"
        id="search-input"
        placeholder="搜尋檔案名稱或程式碼內容…"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="search-clear" class="btn-clear" title="清除搜尋" hidden>✕</button>
    </div>
    <button id="download-all" class="btn-download-all" title="下載全部 VBA 模組（ZIP）"><span class="btn-icon">⬇</span><span class="btn-text"> 全部下載</span></button>
    <button id="theme-toggle" class="btn-theme" title="切換白天/黑夜模式">🌙</button>
  </header>

  <div class="layout">
    <!-- 側欄遮罩（手機用） -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- 左側目錄 -->
    <aside class="sidebar" id="sidebar">
      <div id="tree-panel">
        <!-- 目錄樹由 app.js 動態產生 -->
      </div>
    </aside>

    <!-- 右側預覽 -->
    <main class="content" id="content">
      <div id="search-results" class="search-results" hidden></div>
      <div id="file-view" class="file-view">
        <div class="placeholder">
          <p>👈 從左側選取模組，或使用搜尋框查詢</p>
        </div>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <span>免責申明：基於公開資料，僅供參考，不構成建議</span>
    <span class="footer-sep">·</span>
    <span>資料來源：網頁公開資訊</span>
    <span class="footer-sep">·</span>
    <span>版權所有：© Dunk</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
